[version]
  track_git = True

[performance]
  local_mode = False

[vec]
  num_workers = 16
  envs_per_worker = 1
  num_envs = ${vec:num_workers} * ${vec:envs_per_worker}
  batch_size = 524288

[train]
  compile_env = True
  compile_policy = False
  compile_render = False
  device = cuda
  bptt_horizon = 32
  learning_rate = 2.5e-4
  update_epochs = 4
  num_minibatches = ${vec:batch_size} // (${train:bptt_horizon} * ${train:minibatch_size})
  minibatch_size = 16384
  vf_coef = 0.5
  ent_coef = 0.01
  clip_coef = 0.2
  gamma = 0.99
  gae_lambda = 0.95
  max_grad_norm = 0.5
  
[env]
  package = ocean
  env_name = puffer_drive
  num_agents = 1024

[policy]
  policy_name = puffer_default
  recurrent_episodes = 1
  recurrent_layers = 1
  policy_path = pufferlib/models.py
  use_rnn = False
  input_size = 512
  hidden_size = 512
  output_size = 512
  
[eval]
  eval_mode = False
  eval_frequency = 1
  eval_batch_size = 8192
  wosac_realism_eval = False

[adversarial]
  adversarial_mode = True
  reference_model_path = experiments/latest_checkpoint.pt
  
[sweep]
  entity = pufferai
  project = pufferl
  sweep_name = pufferl
  sweep_config_path = ""
  
[ppo]
  anneal_lr = True

[render]
  mode = human
  width = 1280
  height = 720
