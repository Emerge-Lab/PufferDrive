[base]
package = ocean
env_name = puffer_drive
policy_name = Drive
; No RNN for initial testing
; rnn_name = Recurrent

[vec]
num_workers = 2
num_envs = 2
batch_size = 2
; backend = Serial

[policy]
input_size = 64
hidden_size = 256

[env]
num_agents = 16
; Options: discrete, continuous
action_type = discrete
; Options: classic, jerk
dynamics_model = classic
reward_vehicle_collision = -0.5
reward_offroad_collision = -0.2
reward_ade = 0.0
dt = 0.1
reward_goal = 1.0
reward_goal_post_respawn = 0.25
goal_radius = 2.0
goal_behavior = 0
collision_behavior = 0
offroad_behavior = 0
scenario_length = 91
resample_frequency = 910
num_maps = 100
init_steps = 0
control_mode = "control_vehicles"
init_mode = "create_all_valid"

[train]
total_timesteps = 1_000_000
device=cpu
anneal_lr = True
; batch_size needs to be: num_agents * num_workers * BPTT horizon = 16 * 2 * 32 = 1024
batch_size = 1024
minibatch_size = 512
max_minibatch_size = 512
bptt_horizon = 32
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 1e-8
clip_coef = 0.2
ent_coef = 0.005
gae_lambda = 0.95
gamma = 0.98
learning_rate = 0.003
max_grad_norm = 1
prio_alpha = 0.85
prio_beta0 = 0.85
update_epochs = 1
vf_clip_coef = 0.2
vf_coef = 2
vtrace_c_clip = 1
vtrace_rho_clip = 1
checkpoint_interval = 100
; Rendering options
render = True
render_interval = 100
obs_only = True
show_grid = False
show_lasers = False
show_human_logs = True
render_map = none
; Disable torch.compile for initial testing
compile = False

[eval]
eval_interval = 100
backend = PufferEnv
wosac_realism_eval = False
wosac_num_rollouts = 32
wosac_init_steps = 10
wosac_num_agents = 16
wosac_control_mode = "control_tracks_to_predict"
wosac_init_mode = "create_all_valid"
wosac_goal_behavior = 2
wosac_goal_radius = 2.0
wosac_sanity_check = False
wosac_aggregate_results = True
human_replay_eval = False
human_replay_control_mode = "control_sdc_only"
human_replay_num_agents = 16

[adversarial]
; Enable adversarial multi-policy training
adversarial_mode = False
; Path to reference policy checkpoint (set when adversarial_mode = True)
reference_model_path = none
